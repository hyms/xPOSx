services:
  backend:
    image: xposx-backend:local
    container_name: xpos-backend
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpireDays=${JWT_EXPIRE_DAYS}
      - ConnectionStrings__DefaultConnection=${NEON}
    networks:
      - xpos-network

  frontend:
    image: xposx-frontend:local
    container_name: xpos-frontend
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - xpos-network

networks:
  xpos-network:
    driver: bridge
