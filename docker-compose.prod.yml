services:
  db:
    image: postgres:16-alpine
    container_name: xpos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xpos_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-xpos_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xpos-network

  backend:
    image: xposx-backend:local
    container_name: xpos-backend
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-xpos_db}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpireDays=${JWT_EXPIRE_DAYS}
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB:-xpos_db};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - xpos-network

  frontend:
    image: xposx-frontend:local
    container_name: xpos-frontend
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - xpos-network

networks:
  xpos-network:
    driver: bridge

volumes:
  pgdata:
