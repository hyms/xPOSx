services:
  db:
    image: postgres:17-alpine
    container_name: xpos-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xpos_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-xpos_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xpos-network

  backend:
    build:
      context: ./backend
    container_name: xpos-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/src
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpireDays=${JWT_EXPIRE_DAYS}
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB:-xpos_db};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - xpos-network

  frontend:
    build:
      context: ./frontend
    container_name: xpos-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - xpos-network

networks:
  xpos-network:
    driver: bridge

volumes:
  pgdata:
